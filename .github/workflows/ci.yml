name: CI

on:
  push:
    branches: [ main, "feature/**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-verify:
    strategy:
      matrix:
        ide-version: [ "2025.1", "2025.2.6.2" ]
      fail-fast: false
    runs-on: ubuntu-latest
    name: Build & Verify — ${{ matrix.ide-version }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew buildPlugin -PideVersion=${{ matrix.ide-version }}

      - name: Run tests
        run: ./gradlew test

      - name: Verify plugin
        run: ./gradlew verifyPlugin -PideVersion=${{ matrix.ide-version }}

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-${{ matrix.ide-version }}
          path: build/reports/pluginVerifier/
          retention-days: 7

